services:
  auth-service:
    image: samarkinivan/auth-service:latest
    container_name: auth-service
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTIONSTRINGS__DBCONNECTION: "Host=auth-service-db;Database=AuthDB;Username=postgres;Password=SecretPassword161"
      COMMON__SECRETKEY: "secret_key_88002353535_161"
      CLIENT__BASEURL: "http://147.45.78.164:3000"
      RMQ__HOSTNAME: "host.docker.internal"
      RMQ__USERNAME: "default_user"
      RMQ__PASSWORD: "default_password"
    ports:
      - "8081:8080"
    depends_on:
      - auth-service-db

  auth-service-db:
    image: postgres:17
    container_name: auth-service-db
    restart: on-failure
    environment:
      POSTGRES_DB: AuthDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword161
    ports:
      - "5432:5432"
    volumes:
      - ./.meta/postgres/data:/var/lib/postgresql/data
