services:
  auth-service:
    image: samarkinivan/auth-service:latest
    container_name: auth-service
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    ports:
      - "8081:8080"
    depends_on:
      - auth-service-db

  auth-service-db:
    image: postgres:17
    container_name: auth-service-db
    restart: on-failure
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./.meta/postgres/data:/var/lib/postgresql/data
